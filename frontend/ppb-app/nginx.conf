server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers — App B CAN be embedded ONLY by App A (Merchant)
    # Modern CSP frame-ancestors takes precedence over X-Frame-Options in modern browsers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src https://link.tink.com; connect-src 'self' ${BACKEND_URL} https://api.tink.com https://fonts.googleapis.com; frame-ancestors 'self' ${MERCHANT_APP_URL};" always;

    # Legacy fallback for browsers that don't support CSP frame-ancestors
    add_header X-Frame-Options "ALLOW-FROM ${MERCHANT_APP_URL}" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
